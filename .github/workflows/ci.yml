# begin ci.yml
name: Integration Tests

on:
  push:
    paths:
      - '*.py'
      - 'fixtures/**'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  tier1:
    name: "Tier 1: Pipeline Mechanics"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration tests
        uses: actions/checkout@v6

      - name: Checkout grader template
        uses: actions/checkout@v6
        with:
          repository: kangwonlee/python-pytest-template
          path: grader-template
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build grader image
        run: docker build -t integration-test-grader:latest ./grader-template

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Create virtual environment
        run: uv venv .venv --python 3.11

      - name: Install test dependencies
        run: uv pip install pytest

      - name: Run Tier 1 tests
        env:
          GRADER_IMAGE: integration-test-grader:latest
        run: |
          source .venv/bin/activate
          pytest test_container_build.py test_grading_pipeline.py test_report_format.py \
            -v --tb=short --junitxml=tier1-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier1-results
          path: tier1-results.xml
          retention-days: 14

  tier2:
    name: "Tier 2: AI Tutor"
    runs-on: ubuntu-latest
    needs: tier1
    if: >-
      secrets.CLAUDE_API_KEY != '' ||
      secrets.GOOGLE_API_KEY != '' ||
      secrets.XAI_API_KEY != '' ||
      secrets.NVIDIA_NIM_API_KEY != '' ||
      secrets.PERPLEXITY_API_KEY != ''
    steps:
      - name: Checkout integration tests
        uses: actions/checkout@v6

      - name: Checkout grader template
        uses: actions/checkout@v6
        with:
          repository: kangwonlee/python-pytest-template
          path: grader-template
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build grader image
        run: docker build -t integration-test-grader:latest ./grader-template

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Create virtual environment
        run: uv venv .venv --python 3.11

      - name: Install test dependencies
        run: uv pip install pytest

      - name: Run Tier 2 tests
        env:
          GRADER_IMAGE: integration-test-grader:latest
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          DEFAULT_MODEL: ${{ secrets.DEFAULT_MODEL }}
        run: |
          source .venv/bin/activate
          pytest test_ai_tutor.py \
            -v --tb=short --junitxml=tier2-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier2-results
          path: tier2-results.xml
          retention-days: 14

# end ci.yml
